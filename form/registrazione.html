<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione</title>
    <link rel="stylesheet" href="/asset/css/navbar.css">
    <link rel="stylesheet" href="/asset/css/form/form.css">
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">Il mio viaggio a...</a>
        <ul>
            <li>
                <a href="#home">Home</a>
            </li>
            <li>
                <a href="#aboutus">About Us</a>
            </li>
            <li>
                <a href="#contactus">Contact Us</a>
            </li>
        </ul>
    </nav>  
    <div class="form-wrapper">
        <h1>
            Registrazione per l'acquisto dell'Itinerario
        </h1>
        <form class="form-box">
            <label>Nome</label>
            <input type="text" placeholder="Inserisci il tuo nome" required>

            <label>Cognome</label>
            <input type="text" placeholder="Inserisci il tuo cognome" required>

            <label>Email</label>
            <input type="email" placeholder="Inserisci la tua email" required>

            <label>Telefono</label>
            <input type="number" placeholder="Inserisci il tuo numero di telefono" required>

            <label>Note Aggiuntive</label>
            <textarea rows="4"></textarea>

            <button type="submit" class="btn-submit">Invia Registrazione</button>
        </form>

        <a href="../card.html"><button class="mostra-itinerario">Torna Indietro</button></a>
    </div>
</body>
</html>
